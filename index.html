<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Golden Bot</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
                background-color: black;
                background-size: cover;
                background-image: url("https://images.pexels.com/photos/7245519/pexels-photo-7245519.jpeg");
                backdrop-filter: blur(1.5px);
                user-select: none;
                
            }
            .container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }
            .title {
                font-size: 48px;
                color: #ffcc00;
                text-shadow: 0px 0px 10px #ffcc00;
            }
            .button-container {
                margin-top: 30px;
            }
            .button {
                font-size: 24px;
                padding: 15px 40px;
                background-color: #007bff;
                border: none;
                color: #fff;
                border-radius: 8px;
                cursor: pointer;
                box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            }

            .button:hover {
                background-color: #0056b3;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 class="title">Golden Bot</h1>
            <div class="button-container">
                <button class="button" onclick="window.open(`https://discord.com/api/oauth2/authorize?client_id=1125568711923863674&permissions=8&scope=bot`)">Add to Server</button>
            </div>
            <div class="button-background"></div>
        </div>
    </body>
</html>
